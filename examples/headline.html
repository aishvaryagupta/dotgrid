<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Matrix Text — Headline Mode</title>

  <!-- Google Font: Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Dot Matrix CSS -->
  <link rel="stylesheet" href="../dot-matrix-text.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f5f7;
      font-family: "Space Grotesk", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      padding: 4rem 2rem;
      text-align: left;
    }

    .hero-headline {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .hero-sub {
      margin-top: 2rem;
      font-size: 1.125rem;
      color: rgba(245, 245, 247, 0.5);
      max-width: 520px;
    }

    .cta {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.875rem 2rem;
      background: #ff5d22;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .cta:hover { background: #e04e17; }
  </style>
</head>
<body>

  <div class="hero">
    <!--
      Headline mode: entire text rendered as dots on a single canvas.
      Static text appears in data-static-color (white).
      The {ship,build} segment cycles in data-active-color (orange).
      Lines are defined as a JSON array; {word1,word2} marks the cycling part.
    -->
    <div class="hero-headline"
         data-dot-matrix="headline"
         data-lines='["Learn to {ship,build} what","you design."]'
         data-active-color="#ff5d22"
         data-static-color="#f5f5f7"
         data-hold="2500"
         data-transition-frames="14">
    </div>

    <p class="hero-sub">
      A hands-on program for designers who want to bring their own ideas to life.
      No hand-off. No waiting. Just build.
    </p>

    <a href="#" class="cta">Apply now</a>
  </div>

  <!-- Dot Matrix JS -->
  <script src="../dot-matrix-text.js"></script>

</body>
</html>
